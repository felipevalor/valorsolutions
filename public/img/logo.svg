<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 44" fill="none" role="img" aria-label="Valor Solutions">
  <title>Valor Solutions</title>

  <!-- Diagonal pill stroke (top-right to bottom-left) -->
  <line x1="30" y1="4" x2="15" y2="40" stroke="#f45151" stroke-width="9.5" stroke-linecap="round"/>

  <!-- Large circle (upper-left) -->
  <circle cx="7" cy="14" r="5.8" fill="#f45151"/>

  <!-- Small circle (mid-left, offset diagonally) -->
  <circle cx="13.5" cy="25" r="4.2" fill="#f45151"/>

  <!-- Wordmark -->
  <text x="43" y="30"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="22"
    fill="#0a0a0a"
    letter-spacing="-0.3">Valor Solutions</text>
</svg>
